<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NEENOSLEEP - VHS Countdown + TV</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#ffffff;
      --panel:#0b0b0b;
      --panel2:#090909;
      --red:#b51212;
      --red2:#6b0d0d;
      --white:#f2f2f2;
      --muted:#aaaaaa;
      --green:#6cc08a;
      --amber:#cfab64;
      --tv-shell:#0b0b0b;
      --tv-shell-dark:#000000;
    }

    *{box-sizing:border-box}
    html,body{
      width:100%;height:100%;
      margin:0;padding:0;
      background:var(--bg);
      color:var(--white);
      font-family:"Press Start 2P", system-ui, monospace;
      overflow:hidden;
    }
    .hidden{display:none!important}
    .stage{width:100vw;height:100vh;}

    .tv{
      width:100%;height:100%;
      border-radius:0;
      padding:18px 18px 44px;
      background:linear-gradient(145deg,var(--tv-shell),var(--tv-shell-dark));
      box-shadow:inset 0 0 0 2px rgba(255,255,255,.05), inset 0 0 30px rgba(255,255,255,.04);
      position:relative;
    }
    .tv-brand{
      position:absolute;left:50%;bottom:8px;
      transform:translateX(-50%) rotate(0deg);
      color:var(--red);
      font-size:22px;letter-spacing:.08em;
      text-shadow:0 1px 0 #fff,0 2px 0 var(--red2),0 0 8px rgba(181,18,18,.35);
      user-select:none;pointer-events:none;
      white-space:nowrap;
    }

    .tv-inner{
      width:100%;height:100%;
      border-radius:14px;padding:18px;
      background:linear-gradient(160deg,#202020,#0f0f0f);
      box-shadow:inset 0 0 22px rgba(255,255,255,.05);
    }

    .screen{
      width:100%;height:100%;
      border-radius:22px;border:2px solid #3a3a3a;
      background:#090909;position:relative;overflow:auto;
      box-shadow:inset 0 0 40px rgba(0,0,0,.62), inset 0 0 0 1px rgba(255,255,255,.08);
    }

    .screen::before{
      content:"";
      position:absolute;inset:0;pointer-events:none;z-index:3;
      background:
        radial-gradient(120% 70% at 50% -10%, rgba(255,255,255,.12), transparent 46%),
        radial-gradient(120% 90% at 50% 120%, rgba(0,0,0,.24), transparent 40%);
    }

    .scan{
      position:absolute;inset:0;pointer-events:none;opacity:.16;z-index:4;
      background:repeating-linear-gradient(to bottom, rgba(255,255,255,.06), rgba(255,255,255,.06) 1px, transparent 2px, transparent 4px);
    }

    .noise{
      position:absolute;inset:0;pointer-events:none;opacity:.08;mix-blend-mode:screen;z-index:4;
      background-image:url('data:image/svg+xml;utf8,\
      <svg xmlns="http://www.w3.org/2000/svg" width="160" height="160" viewBox="0 0 160 160">\
      <filter id="n"><feTurbulence type="fractalNoise" baseFrequency=".9" numOctaves="2" stitchTiles="stitch"/></filter>\
      <rect width="160" height="160" filter="url(%23n)" opacity=".55"/></svg>');
      animation:grain .2s steps(2) infinite;
    }
    @keyframes grain{
      0%{transform:translate(0,0)}25%{transform:translate(1px,-1px)}
      50%{transform:translate(-1px,1px)}75%{transform:translate(1px,1px)}
      100%{transform:translate(0,0)}
    }

    .home-static{
      position:absolute;inset:0;pointer-events:none;z-index:2;
      opacity:.13;
      background:
        repeating-radial-gradient(circle at 20% 30%, rgba(255,255,255,.2) 0 1px, transparent 1px 3px),
        repeating-radial-gradient(circle at 80% 70%, rgba(255,255,255,.16) 0 1px, transparent 1px 4px);
      animation:staticShift .15s steps(2,end) infinite;
    }
    @keyframes staticShift{
      0%{transform:translate(0,0)}
      25%{transform:translate(1px,-1px)}
      50%{transform:translate(-1px,1px)}
      75%{transform:translate(1px,1px)}
      100%{transform:translate(0,0)}
    }

    .hud{
      position:sticky;top:0;z-index:6;height:36px;padding:0 10px;
      display:flex;align-items:center;justify-content:space-between;
      border-bottom:1px solid #2f2f2f;
      background:linear-gradient(180deg,rgba(18,18,18,.95),rgba(10,10,10,.95));
      font-size:10px;color:#d8d8d8;
    }
    .dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px;background:var(--green);box-shadow:0 0 8px rgba(108,192,138,.75)}
    .score{color:var(--amber);} /* ✅ 已修复 */

    .page{position:relative;min-height:calc(100% - 36px);padding:24px;z-index:1;}
    .center{min-height:calc(100vh - 130px);display:grid;place-items:center;text-align:center;}

    .title{
      margin:0;font-weight:400;letter-spacing:.08em;text-transform:uppercase;
      font-size:clamp(28px,6.2vw,86px);color:var(--red);line-height:1.3;
      text-shadow:0 1px 0 #fff,0 2px 0 var(--red2),0 0 10px rgba(181,18,18,.42);
    }
    .subtitle{margin-top:14px;font-size:10px;color:#d3d3d3;line-height:1.8}
    .start-btn{
      margin-top:30px;border:1px solid #3a3a3a;background:#080808;color:var(--red);
      font-size:14px;padding:12px 14px;cursor:pointer;font-family:"Press Start 2P", monospace;
      text-shadow:0 1px 0 #fff,0 2px 0 var(--red2);animation:blink 1s steps(2,end) infinite;
    }
    @keyframes blink{0%,49%{opacity:1}50%,100%{opacity:.45}}
    .hint{margin-top:12px;color:var(--muted);font-size:10px;line-height:1.7}

    .panel{width:min(1100px,96%);margin:0 auto;border:1px solid #2b2b2b;background:var(--panel);padding:16px;}
    .panel h2{margin:0 0 10px;color:var(--red);font-size:16px}
    .crumb{font-size:10px;color:#bdbdbd;margin-bottom:10px;line-height:1.8}
    .crumb span{color:var(--red)}
    .menu-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}
    .menu-card{border:1px solid #2d2d2d;background:var(--panel2);padding:14px;cursor:pointer}
    .k{font-size:9px;color:#b8b8b8;line-height:1.8}
    .v{margin-top:6px;font-size:12px;line-height:1.6}
    .actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
    .btn{border:1px solid #2d2d2d;background:#0a0a0a;color:#eee;padding:8px 10px;cursor:pointer;font-family:"Press Start 2P";font-size:10px}
    .btn.red{border-color:var(--red)}
    .media-grid,.products{display:grid;gap:12px;grid-template-columns:repeat(auto-fill,minmax(220px,1fr))}
    .media-item,.card{border:1px solid #2d2d2d;background:#0a0a0a;overflow:hidden}
    .media-item img,.card img{width:100%;display:block;object-fit:cover}
    .media-item img{height:150px}.card img{height:200px}
    .media-item .meta,.card .body{padding:10px;font-size:10px;line-height:1.7}
    .controls{display:grid;grid-template-columns:1fr 180px 180px;gap:8px;margin-bottom:10px}
    .input,.select{width:100%;padding:10px;border:1px solid #2d2d2d;background:#090909;color:#f1f1f1;font-family:"Press Start 2P";font-size:10px}
    .price{color:var(--red);margin-top:6px;font-size:11px}

    .vhs-loading{
      position:fixed;inset:0;z-index:999;background:#000;
      display:flex;align-items:center;justify-content:center;overflow:hidden;
    }
    .vhs-wrap{
      width:min(88vmin,700px);height:min(88vmin,700px);
      border:2px solid rgba(255,255,255,.4);border-radius:50%;
      position:relative;display:grid;place-items:center;
    }
    .vhs-cross::before,.vhs-cross::after{
      content:"";position:absolute;left:50%;top:50%;background:rgba(255,255,255,.45);
      transform:translate(-50%,-50%);
    }
    .vhs-cross::before{width:2px;height:120%}
    .vhs-cross::after{width:120%;height:2px}
    .vhs-num{font-size:20vmin;line-height:1;color:#fff;text-shadow:0 0 12px rgba(255,255,255,.35);}
    .vhs-label{position:absolute;top:20px;left:20px;font-size:12px;color:#ddd;opacity:.75;}
    .vhs-ring{
      position:absolute;inset:0;border-radius:50%;
      border:2px solid rgba(255,255,255,.7);
      clip-path:polygon(50% 50%,50% 0,100% 0,100% 100%,0 100%,0 0,50% 0);
      animation:sweep 1s linear infinite;
    }
    @keyframes sweep{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
    .vhs-noise{
      position:absolute;inset:0;pointer-events:none;opacity:.13;
      background:repeating-linear-gradient(to bottom, rgba(255,255,255,.07), rgba(255,255,255,.07) 1px, transparent 2px, transparent 5px);
    }
    .vhs-flicker{animation:flicker .12s steps(2,end) infinite}
    @keyframes flicker{0%{opacity:1}50%{opacity:.92}100%{opacity:1}}
  </style>
</head>
<body>
  <div id="vhsLoading" class="vhs-loading vhs-flicker">
    <div class="vhs-label">PICTURE START</div>
    <div class="vhs-wrap">
      <div class="vhs-cross"></div>
      <div class="vhs-ring"></div>
      <div id="vhsNum" class="vhs-num">3</div>
    </div>
    <div class="vhs-noise"></div>
  </div>

  <div class="stage">
    <div class="tv">
      <div class="tv-inner">
        <div class="screen">
          <div class="hud">
            <div><span class="dot"></span>PLAYER 1</div>
            <div class="score">CREDIT 01</div>
            <div id="hudRoute">HOME</div>
          </div>

          <section id="home" class="page">
            <div class="home-static"></div>
            <div class="center">
              <div>
                <h1 class="title">NEENOSLEEP</h1>
                <div class="subtitle">RETRO ARCADE START SCREEN</div>
                <button id="pressStart" class="start-btn">▶ PRESS START</button>
              </div>
            </div>
          </section>

          <section id="menu" class="page hidden"><div class="panel"><div class="crumb">HOME / <span>MENU</span></div><h2>NEENOSLEEP / MENU</h2><div class="menu-grid"><div class="menu-card" data-route="media"><div class="k">Section</div><div class="v">MEDIA</div></div><div class="menu-card" data-route="product"><div class="k">Section</div><div class="v">PRODUCT</div></div></div><div class="actions"><button class="btn red" data-route="media">进入 MEDIA</button><button class="btn" data-route="product">进入 PRODUCT</button><button class="btn" data-route="home">返回 HOME</button></div></div></section>
          <section id="media" class="page hidden"><div class="panel"><div class="crumb">HOME / MENU / <span>MEDIA</span></div><h2>MEDIA</h2></div></section>
          <section id="product" class="page hidden"><div class="panel"><div class="crumb">HOME / MENU / <span>PRODUCT</span></div><h2>PRODUCT</h2><div id="productGrid" class="products"></div></div></section>

          <div class="scan"></div>
          <div class="noise"></div>
        </div>
      </div>
      <div class="tv-brand">NEENOSLEEP</div>
    </div>
  </div>

  <script>
    const routes = {
      home: document.getElementById('home'),
      menu: document.getElementById('menu'),
      media: document.getElementById('media'),
      product: document.getElementById('product'),
    };
    const hudRoute = document.getElementById('hudRoute');

    function go(route){
      Object.values(routes).forEach(el => el.classList.add('hidden'));
      (routes[route] || routes.home).classList.remove('hidden');
      hudRoute.textContent = (route || 'home').toUpperCase();
    }

    document.getElementById('pressStart').addEventListener('click', () => go('menu'));
    document.querySelectorAll('[data-route]').forEach(el=>el.addEventListener('click', ()=>go(el.dataset.route)));

    function startVHSCountdown(){
      const loading = document.getElementById('vhsLoading');
      const num = document.getElementById('vhsNum');
      let count = 4;
      const tick = () => {
        num.textContent = count;
        count--;
        if(count < 0){
          loading.classList.add('hidden');
          go('home');
          return;
        }
        setTimeout(tick, 1000);
      };
      tick();
    }

    window.addEventListener('load', startVHSCountdown);
  </script>
</body>
</html>
