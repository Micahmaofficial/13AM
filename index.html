<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>B4M</title>
  <style>
    :root {
      --text: #ffffff;
      --muted: rgba(255,255,255,0.9);
      --accent: #ff4d4d;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #ffffff; color: #111; }
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      overflow-x: hidden;
    }

    button, .clickable { cursor: pointer; font: inherit; }

    /* ===== 首页（纯白） ===== */
    .home-screen {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      overflow: hidden;
      opacity: 1;
      transition: opacity 0.4s ease;
    }

    .home-screen.hidden-home {
      opacity: 0;
      pointer-events: none;
    }

    .home-content {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .brand-relief {
      font-family: Impact, Haettenschweiler, 'Arial Black', sans-serif;
      font-size: clamp(32px, 8vw, 72px);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      color: #ffffff;
      text-shadow:
        1px 1px 0 rgba(255, 250, 250, 0.802),
        -1px -1px 0 rgba(196, 195, 193, 0.422);
      user-select: none;
      line-height: 1;
      z-index: 10;
    }

    .circle-nav {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: min(320px, 70vw);
      height: min(320px, 70vw);
      z-index: 20;
    }

    .logo-full {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .nav-zone {
      position: absolute;
      width: 52px;
      height: 52px;
      background: transparent;
      border: none;
      z-index: 30;
      transition: transform 0.2s;
    }
    .nav-zone:hover { transform: scale(1.1); }
    .nav-zone:focus-visible { outline: 2px solid #c41e3a; outline-offset: 4px; }

    .zone-top    { top: -26px; left: 50%; transform: translateX(-50%); }
    .zone-bottom { bottom: -26px; left: 50%; transform: translateX(-50%); }
    .zone-left   { left: -26px; top: 50%; transform: translateY(-50%); }
    .zone-right  { right: -26px; top: 50%; transform: translateY(-50%); }

    /* ===== 扩散过渡元素 ===== */
    .expand-overlay {
      position: fixed;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-radius: 50%;
      background: radial-gradient(circle at center, 
        rgba(255, 60, 60, 0.95) 0%, 
        rgba(180, 20, 20, 0.9) 30%, 
        rgba(80, 0, 0, 0.85) 60%, 
        rgba(20, 0, 0, 0.95) 100%);
      transform: translate(-50%, -50%);
      z-index: 25;
      pointer-events: none;
      opacity: 1;
      transition: width 2s cubic-bezier(0.25, 0.8, 0.25, 1), 
                  height 2s cubic-bezier(0.25, 0.8, 0.25, 1),
                  box-shadow 2s cubic-bezier(0.25, 0.8, 0.25, 1),
                  opacity 0.8s ease;
      box-shadow: 0 0 0 0 rgba(255, 30, 30, 0.9);
    }

    .expand-overlay.active {
      width: 350vmax;
      height: 350vmax;
      box-shadow: 
        0 0 80px 40px rgba(255, 40, 40, 0.7),
        0 0 160px 80px rgba(200, 20, 20, 0.5),
        0 0 300px 150px rgba(120, 0, 0, 0.4);
    }

    .expand-overlay.fade-out {
      opacity: 0;
    }

    .expand-overlay.reset {
      transition: none !important;
    }

    /* ===== 流动背景（暗红） ===== */
    .flow-bg {
      position: fixed;
      inset: 0;
      z-index: 20;
      background: 
        radial-gradient(circle at 30% 40%, #5a0000 0%, transparent 60%),
        radial-gradient(circle at 70% 60%, #2d0000 0%, transparent 60%),
        radial-gradient(circle at 50% 80%, #3a0000 0%, transparent 60%);
      background-size: 200% 200%;
      animation: smokeFlow 18s ease infinite alternate;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.6s ease;
    }

    body.show-flow .flow-bg {
      opacity: 1;
      pointer-events: auto;
    }

    @keyframes smokeFlow {
      0% { background-position: 0% 0%; }
      100% { background-position: 100% 100%; }
    }

    /* ===== 二级滚动页 ===== */
    .feed-page {
      position: relative;
      z-index: 30;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.6s ease;
    }

    body.show-feed .feed-page {
      opacity: 1;
      pointer-events: auto;
    }

    .feed-section {
      min-height: 100vh;
      width: 100%;
      padding: 50px 5vw 60px;
      background: transparent;
      display: flex;
      flex-direction: column;
    }

    .section-header {
      text-align: center;
      margin-bottom: 30px;
      position: sticky;
      top: 0;
      z-index: 2;
      padding: 15px 0 10px;
      background: rgba(10, 0, 0, 0.55);
      backdrop-filter: blur(6px);
      border-radius: 0 0 20px 20px;
    }

    .section-title-ch {
      font-family: 'KaiTi', '楷体', 'Noto Serif TC', serif;
      font-size: clamp(48px, 8vw, 80px);
      font-weight: 700;
      color: #ffffff;
      text-shadow: 0 2px 12px rgba(0,0,0,0.6);
      margin-bottom: 4px;
    }

    .section-subtitle {
      font-family: 'KaiTi', '楷体', 'Noto Serif TC', serif;
      font-size: 24px;
      color: var(--accent);
      margin-bottom: 12px;
    }

    .section-intro {
      font-family: 'KaiTi', '楷体', 'Noto Serif TC', serif;
      font-size: 16px;
      line-height: 1.8;
      color: var(--muted);
      max-width: 600px;
      margin: 0 auto;
      padding: 10px 16px;
      background: rgba(0,0,0,0.4);
      border-left: 3px solid var(--accent);
      outline: none;
      min-height: 50px;
      text-align: left;
      border-radius: 4px;
    }

    .section-intro:empty::before {
      content: "在此填写详细内容…";
      color: rgba(255,255,255,0.5);
    }

    .media-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
      margin-top: 10px;
    }

    .grid-item {
      position: relative;
      overflow: hidden;
      border-radius: 8px;
      cursor: pointer;
      aspect-ratio: 3/4;
      background: rgba(0,0,0,0.3);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .grid-item:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.6);
    }

    .grid-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .grid-caption {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 12px 14px;
      background: linear-gradient(transparent, rgba(0,0,0,0.8));
      color: white;
      pointer-events: none;
    }

    .grid-tag {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #ff9999;
      margin-bottom: 2px;
    }

    .grid-title {
      font-size: 16px;
      font-weight: 600;
    }

    /* 返回按钮 */
    .back-home-fixed {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 100;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      padding: 8px 18px;
      font-size: 14px;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.6s ease;
    }

    body.show-feed .back-home-fixed {
      opacity: 1;
      pointer-events: auto;
    }

    /* ===== 三级详情模态框 ===== */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 200;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .modal-overlay.open { display: flex; }

    .modal-content {
      background: #1a1a1a;
      color: #eee;
      max-width: 800px;
      width: 100%;
      max-height: 90vh;
      border-radius: 16px;
      overflow-y: auto;
      padding: 32px;
      position: relative;
      animation: modalIn 0.25s ease;
    }

    @keyframes modalIn {
      from { opacity: 0; transform: translateY(18px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .modal-close {
      position: absolute;
      top: 16px; right: 16px;
      background: none;
      border: none;
      font-size: 24px;
      color: #aaa;
      width: 36px; height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      cursor: pointer;
    }
    .modal-close:hover { background: #333; }

    .modal-content h2 { font-size: 28px; margin-bottom: 12px; }
    .modal-content p { color: #ccc; line-height: 1.7; }

    .detail-image {
      width: 100%;
      border-radius: 12px;
      margin: 16px 0;
      background: #333;
      aspect-ratio: 16/9;
      object-fit: cover;
    }

    .payment-section {
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid #444;
    }
    .payment-title { font-weight: 600; margin-bottom: 12px; }
    .payment-buttons { display: flex; flex-wrap: wrap; gap: 10px; }
    .pay-btn {
      padding: 10px 18px;
      border: 1px solid #555;
      border-radius: 8px;
      background: #2a2a2a;
      color: #ddd;
      font-weight: 600;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background 0.15s;
    }
    .pay-btn:hover { background: #444; }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <!-- 首页 -->
  <div id="homeScreen" class="home-screen">
    <div class="home-content">
      <div class="brand-relief">B4M</div>

      <div class="circle-nav">
        <!-- ★ 替换为你的完整 Logo PNG -->
        <img class="logo-full" 
             src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 200'%3E%3Ccircle cx='100' cy='100' r='92' fill='none' stroke='%23c41e3a' stroke-width='2'/%3E%3Ccircle cx='100' cy='20' r='12' fill='%23c41e3a'/%3E%3Ccircle cx='100' cy='180' r='12' fill='%23c41e3a'/%3E%3Ccircle cx='20' cy='100' r='12' fill='%23c41e3a'/%3E%3Ccircle cx='180' cy='100' r='12' fill='%23c41e3a'/%3E%3C/svg%3E"
             alt="B4M Logo" />

        <button class="nav-zone zone-top" data-route="gallery" aria-label="Gallery"></button>
        <button class="nav-zone zone-bottom" data-route="product" aria-label="Product"></button>
        <button class="nav-zone zone-left" data-route="media" aria-label="Media"></button>
        <button class="nav-zone zone-right" data-route="about" aria-label="About"></button>
      </div>
    </div>
  </div>

  <!-- 扩散过渡层 -->
  <div class="expand-overlay" id="expandOverlay"></div>

  <!-- 流动背景（暗红） -->
  <div class="flow-bg"></div>

  <!-- 返回按钮 -->
  <button class="back-home-fixed" id="backHomeFixed">← Home</button>

  <!-- 二级滚动页 -->
  <div id="feedPage" class="feed-page">
    <div id="feedContent"></div>
  </div>

  <!-- 三级详情模态框 -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-content" id="modalContent"></div>
  </div>

  <script>
    (() => {
      const data = {
        gallery: [
          { img: 'https://placehold.co/600x800/222/eee?text=Gallery+1', title: 'Evening Glow', desc: 'Oil on canvas, 2025' },
          { img: 'https://placehold.co/600x600/222/eee?text=Gallery+2', title: 'Still Life', desc: 'Digital print' },
          { img: 'https://placehold.co/600x900/222/eee?text=Gallery+3', title: 'Portrait Study', desc: 'Charcoal on paper' },
          { img: 'https://placehold.co/600x700/222/eee?text=Gallery+4', title: 'Abstract Form', desc: 'Acrylic on wood' },
          { img: 'https://placehold.co/600x500/222/eee?text=Gallery+5', title: 'City Lights', desc: 'Photography' },
          { img: 'https://placehold.co/600x800/222/eee?text=Gallery+6', title: 'Silent Echo', desc: 'Mixed media' },
          { img: 'https://placehold.co/600x600/222/eee?text=Gallery+7', title: 'Morning Dew', desc: 'Watercolor' },
          { img: 'https://placehold.co/600x900/222/eee?text=Gallery+8', title: 'Fragments', desc: 'Collage' },
        ],
        media: [
          { img: 'https://placehold.co/600x400/222/eee?text=Media+1', title: 'Campaign Film', desc: 'Director\'s cut' },
          { img: 'https://placehold.co/600x600/222/eee?text=Media+2', title: 'Behind the Scenes', desc: 'Photo series' },
          { img: 'https://placehold.co/600x400/222/eee?text=Media+3', title: 'Lookbook Video', desc: 'Fashion film' },
          { img: 'https://placehold.co/600x500/222/eee?text=Media+4', title: 'Soundscape', desc: 'Audio visual' },
          { img: 'https://placehold.co/600x300/222/eee?text=Media+5', title: 'Interview', desc: 'Artist talk' },
          { img: 'https://placehold.co/600x400/222/eee?text=Media+6', title: 'Animation', desc: 'Short film' },
        ],
        product: [
          { img: 'https://placehold.co/600x800/222/eee?text=Product+1', title: 'Signature Hoodie', desc: 'Limited edition', price: '¥890' },
          { img: 'https://placehold.co/600x700/222/eee?text=Product+2', title: 'Ceramic Vessel', desc: 'Hand thrown', price: '¥1,200' },
          { img: 'https://placehold.co/600x500/222/eee?text=Product+3', title: 'Art Print Set', desc: 'A3, 3 pieces', price: '¥450' },
          { img: 'https://placehold.co/600x800/222/eee?text=Product+4', title: 'Linen Shirt', desc: 'Stone washed', price: '¥780' },
          { img: 'https://placehold.co/600x600/222/eee?text=Product+5', title: 'Enamel Pin', desc: 'Gold plating', price: '¥128' },
          { img: 'https://placehold.co/600x700/222/eee?text=Product+6', title: 'Tote Bag', desc: 'Canvas', price: '¥320' },
          { img: 'https://placehold.co/600x900/222/eee?text=Product+7', title: 'Candle Set', desc: 'Soy wax', price: '¥560' },
        ],
        about: [
          { img: 'https://placehold.co/600x600/222/eee?text=About+1', title: 'Our Studio', desc: 'Shanghai based' },
          { img: 'https://placehold.co/600x400/222/eee?text=About+2', title: 'The Team', desc: 'Creative collective' },
          { img: 'https://placehold.co/600x600/222/eee?text=About+3', title: 'Process', desc: 'From sketch to final' },
          { img: 'https://placehold.co/600x400/222/eee?text=About+4', title: 'Exhibitions', desc: '2023-2025' },
          { img: 'https://placehold.co/600x500/222/eee?text=About+5', title: 'Press', desc: 'Featured in' },
        ]
      };

      const sectionsOrder = ['gallery', 'media', 'product', 'about'];
      const elementNames = ['風', '火', '水', '土'];
      const elementSubs = ['意識', '精神', '心靈', '肉體'];

      const body = document.body;
      const homeScreen = document.getElementById('homeScreen');
      const expandOverlay = document.getElementById('expandOverlay');
      const feedContent = document.getElementById('feedContent');
      const modalOverlay = document.getElementById('modalOverlay');
      const modalContent = document.getElementById('modalContent');

      let feedRendered = false;
      let pendingTarget = null;

      function renderFeed() {
        if (feedRendered) return;
        let html = '';
        sectionsOrder.forEach((section, i) => {
          const items = data[section];
          html += `
            <section class="feed-section" id="sec-${section}">
              <div class="section-header">
                <h2 class="section-title-ch">${elementNames[i]}</h2>
                <div class="section-subtitle">${elementSubs[i]}</div>
                <div class="section-intro" contenteditable="true" placeholder="在此填写详细内容…"></div>
              </div>
              <div class="media-grid">
                ${items.map((item, idx) => `
                  <div class="grid-item" data-section="${section}" data-index="${idx}">
                    <img src="${item.img}" alt="${item.title}" loading="lazy" />
                    <div class="grid-caption">
                      <div class="grid-tag">${section}</div>
                      <div class="grid-title">${item.title}</div>
                    </div>
                  </div>
                `).join('')}
              </div>
            </section>
          `;
        });
        feedContent.innerHTML = html;
        feedRendered = true;

        document.querySelectorAll('.grid-item').forEach(item => {
          item.addEventListener('click', () => {
            const sec = item.dataset.section;
            const idx = parseInt(item.dataset.index);
            openDetail(sec, idx);
          });
        });
      }

      function triggerExpand(targetSection) {
        if (expandOverlay.classList.contains('active') || expandOverlay.classList.contains('fade-out')) return;
        pendingTarget = targetSection;

        expandOverlay.classList.remove('reset', 'fade-out');
        expandOverlay.style.opacity = '1';   // 确保可见
        void expandOverlay.offsetWidth;
        expandOverlay.classList.add('active');
      }

      // 扩散动画完成 → 开始淡出红色叠加层
      function onExpandEnd() {
        // ★ 关键修复：移除内联 opacity，让 .fade-out 类生效
        expandOverlay.style.opacity = '';
        expandOverlay.classList.add('fade-out');
        homeScreen.classList.add('hidden-home');
        renderFeed();
      }

      // 红色叠加层淡出结束后 → 显示二级页面
      function onFadeOutEnd() {
        body.classList.add('show-flow', 'show-feed');
        if (pendingTarget) {
          const targetEl = document.getElementById(`sec-${pendingTarget}`);
          if (targetEl) {
            setTimeout(() => targetEl.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
          }
          pendingTarget = null;
        }
        // 重置叠加层状态（无动画）
        expandOverlay.classList.add('reset');
        expandOverlay.classList.remove('active', 'fade-out');
        expandOverlay.style.opacity = '';
        void expandOverlay.offsetWidth;
        expandOverlay.classList.remove('reset');
      }

      // 监听过渡结束
      expandOverlay.addEventListener('transitionend', (e) => {
        if (e.propertyName === 'width' && expandOverlay.classList.contains('active') && !expandOverlay.classList.contains('fade-out')) {
          onExpandEnd();
        }
        if (e.propertyName === 'opacity' && expandOverlay.classList.contains('fade-out')) {
          onFadeOutEnd();
        }
      });

      function goHome() {
        body.classList.remove('show-flow', 'show-feed');
        homeScreen.classList.remove('hidden-home');
        modalOverlay.classList.remove('open');
        window.scrollTo({ top: 0 });

        // 立即重置叠加层
        expandOverlay.classList.add('reset');
        expandOverlay.classList.remove('active', 'fade-out');
        expandOverlay.style.opacity = '';
        void expandOverlay.offsetWidth;
        expandOverlay.classList.remove('reset');
      }

      function openDetail(section, index) {
        const items = data[section];
        if (!items || !items[index]) return;
        const item = items[index];

        let paymentHTML = '';
        if (section === 'product') {
          paymentHTML = `
            <div class="payment-section">
              <div class="payment-title">购买选项</div>
              <div class="payment-buttons">
                <button class="pay-btn">🛒 Shopify</button>
                <button class="pay-btn">💰 PayPal</button>
                <button class="pay-btn">💳 信用卡</button>
                <button class="pay-btn">🔵 支付宝</button>
                <button class="pay-btn">🟢 微信支付</button>
              </div>
              <p style="margin-top:12px; font-size:13px; color: #aaa;">接口已预留，可集成实际支付网关。</p>
            </div>
          `;
        }

        modalContent.innerHTML = `
          <button class="modal-close" onclick="document.getElementById('modalOverlay').classList.remove('open')">✕</button>
          <span class="grid-tag" style="color:#ff4d4d;">${section}</span>
          <h2>${item.title}</h2>
          <img class="detail-image" src="${item.img}" alt="${item.title}" />
          <p>${item.desc}</p>
          ${item.price ? `<p style="font-weight:700; margin-top:8px;">${item.price}</p>` : ''}
          ${paymentHTML}
        `;

        modalOverlay.classList.add('open');
      }

      document.querySelectorAll('.nav-zone').forEach(zone => {
        zone.addEventListener('click', () => triggerExpand(zone.dataset.route));
      });

      document.getElementById('backHomeFixed').addEventListener('click', goHome);

      modalOverlay.addEventListener('click', (e) => {
        if (e.target === modalOverlay) modalOverlay.classList.remove('open');
      });
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && modalOverlay.classList.contains('open')) {
          modalOverlay.classList.remove('open');
        }
      });

      goHome();
    })();
  </script>
</body>
</html>
